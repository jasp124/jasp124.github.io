<head>

    <head>
        
        <title>Jasper's portpholio</title>
        
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');
      
          * {
            margin: 110;
            padding: 0;
            box-sizing: border-box;
          }
      
          body {
            color: #000;
           
          }
      
          .testimonial {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 5rem;
          }
      
          h6 {
            margin: 20px 0;
          }
      
          .line {
            height: 2px;
            width: 6rem;
            background-color: #e26c4f;
            margin-bottom: calc(3rem + 2vmin);
          }
      
          .arrow-wrapper {
            position: relative;
            width: 70%;
            border-radius: 2rem;
            box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
            overflow: hidden;
            place-items: center;
          }
      
          .review-wrap {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: calc(2rem + 1vmin);
            width: 100%;
          }
      
          #imgBox {
            border-radius: 50%;
            width: calc(6rem + 4vmin);
            height: calc(6rem + 4vmin);
            position: relative;
            box-shadow: 5px -3px #e26c4f;
            background-size: cover;
            margin-bottom: calc(0.7rem + 0.5vmin);
          }
      
          #name {
            margin-bottom: calc(0.7rem + 0.5vmin);
            font-size: calc(1rem + 0.5vmin);
            letter-spacing: calc(0.1rem + 0.1vmin);
            font-weight: bold;
          }
      
          #profession {
            font-size: calc(0.8rem + 0.3vmin);
            margin-bottom: calc(0.7rem + 0.5vmin);
            color: #e26c4f;
          }
      
          #description {
            font-size: calc(0.8rem + 0.3vmin);
            width: 70%;
            max-width: 40rem;
            text-align: center;
            margin-bottom: calc(1.4rem + 1vmin);
            color: rgb(92, 92, 92);
            line-height: 2rem;
          }
      
          .arrow {
            width: calc(1.4rem + 0.6vmin);
            height: calc(1.4rem + 0.6vmin);
            border: solid #e26c4f;
            border-width: 0 calc(0.5rem + 0.2vmin) calc(0.5rem + 0.2vmin) 0;
            cursor: pointer;
            transition: transform 0.3s;
          }
      
          .arrow:hover {
            transition: 0.3s;
            transform: scale(1.15);
          }
      
          .left-arrow-wrap {
            position: absolute;
            top: 50%;
            left: 5%;
            transform: rotate(135deg);
          }
      
          .right-arrow-wrap {
            position: absolute;
            top: 50%;
            right: 5%;
            transform: rotate(-45deg);
          }
      
          @media screen and (max-width: 900px) {
            .testimonial {
              width: 100%;
            }
          }
          h1 {
            color: #e26c4f;
            text-align: center;
        }
        </style>
      </head>
      
      <body>
        <div class="testimonial">
          
          <section id="people"></section>
            .
            <h1>Different reasons for doing CS</h1>
          <div class="line"></div>
          <!-- arrow wrapper contains the review and the arrows -->
          <div class="arrow-wrapper">
            <!-- review section -->
            <div id="reviewWrap" class="review-wrap">
              <div id="imgBox"></div>
              <div id="name"></div>
              <div id="profession"></div>
              <div id="description"></div>
            </div>
            <!-- left arrow -->
            <div class="left-arrow-wrap">
              <div class="arrow"></div>
            </div>
            <!-- right arrow -->
            <div class="right-arrow-wrap">
              <div class="arrow"></div>
            </div>
          </div>
        </div>
      
        <script>
          const reviewWrap = document.getElementById("reviewWrap");
          const leftArrow = document.querySelector(".left-arrow-wrap .arrow");
          const rightArrow = document.querySelector(".right-arrow-wrap .arrow");
          const imgBox = document.getElementById("imgBox");
          const name = document.getElementById("name");
          const profession = document.getElementById("profession");
          const description = document.getElementById("description");
      
          let people = [{
              photo: 'url("https://wallpapercave.com/wp/wp2691421.jpg")',
              name: "Cyber Sercurity",
              profession: "I want to progress into this field after my A-Levels.",
              description: "Once I have completed my A-Levels, I plan to study Computer Science with a specialization in Cyber Security. I’m not yet sure which universities I want to apply to, but I know that Manchester and Kent both offer Computer Science courses with a focus on Cyber Security."
            },
            {
              photo: "url('https://yaa.com.pk/wp-content/uploads/2021/01/Data-Protection.jpg')",
              name: "Fammily Experinces in CS",
              profession: "Dad working in data protection",
              description: "My dad has worked in data protection for the last 20 years at a data protection and risk assessment company. From a young age, he often talked about his role and the importance of protecting client data. This is one of the main reasons why I’m so interested in Cyber Security."
            },
            {
              photo: "url('https://beningo-embedded-group.s3.amazonaws.com/2019/07/AdobeStock_116759427.jpeg')",
              name: "Coding",
              profession: "Coding from a young age",
              description: "I’ve been learning coding since I was about 12 years old. I started with basic principles and have since worked on small projects and watched tutorials on Python.

"
            },
            {
              photo: "url('https://th.bing.com/th/id/R.fef610beb6ddf962250950484eb4c497?rik=HYU23uJGqda%2fsw&riu=http%3a%2f%2fwww.pixelstalk.net%2fwp-content%2fuploads%2f2016%2f07%2fComputer-Science-Images.jpg&ehk=elac9FyCiNdjcVWcGCyaLTlvJt4FXty%2flFKWMP4hU3U%3d&risl=&pid=ImgRaw&r=0')",
              name: "Enjoying CS ",
              profession: "Throughout my time studying Computer Science, I’ve enjoyed learning about different principles and concepts.",
              description: "My fascination with computing has made me extremely passionate about continuing to learn and pursue a career in this field."
            }
          ];
      
          // set the first person
          imgBox.style.backgroundImage = people[0].photo;
          name.innerText = people[0].name;
          profession.innerText = people[0].profession;
          description.innerText = people[0].description;
          let currentPerson = 0;
      
          //Select the side where you want to slide
          function slide(side, personNumber) {
            let reviewWrapWidth = reviewWrap.offsetWidth + "px";
            let descriptionHeight = description.offsetHeight + "px";
            //(+ or -)
            let side1symbol = side === "left" ? "" : "-";
            let side2symbol = side === "left" ? "-" : "";
      
            setTimeout(() => {
              imgBox.style.backgroundImage = people[personNumber].photo;
            }, 0);
            setTimeout(() => {
              description.style.height = descriptionHeight;
            }, 100);
            setTimeout(() => {
              name.innerText = people[personNumber].name;
            }, 200);
            setTimeout(() => {
              profession.innerText = people[personNumber].profession;
            }, 300);
            setTimeout(() => {
              description.innerText = people[personNumber].description;
            }, 400);
          }
      
          function setNextCardLeft() {
            if (currentPerson === 3) {
              currentPerson = 0;
              slide("left", currentPerson);
            } else {
              currentPerson++;
            }
      
            slide("left", currentPerson);
          }
      
          function setNextCardRight() {
            if (currentPerson === 0) {
              currentPerson = 3;
              slide("right", currentPerson);
            } else {
              currentPerson--;
            }
      
            slide("right", currentPerson);
          }
      
          leftArrow.addEventListener("click", setNextCardLeft);
          rightArrow.addEventListener("click", setNextCardRight);
        </script>  
</body>
